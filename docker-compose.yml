# ------------------------------------------------------------------------------
# Airflow 3.x Common Configuration
# ------------------------------------------------------------------------------
x-airflow-common: &airflow-common
  image: apache/airflow:3.2.1-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-7T512UXjIQJDhJH_6vH0KFgAVOECmL6vb0ov0eFnIHM=}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__DEFAULT_UI_VERSION: v2
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  restart: unless-stopped

services:
  # ===========================================================================
  # METADATA & STATE STORES
  # ===========================================================================
  
  postgres:
    image: postgres:15-alpine
    mem_limit: 1g
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    mem_limit: 512m
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # STREAMING - REDPANDA (Kafka Compatible)
  # ===========================================================================
  
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    mem_limit: 4g
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --memory 3G
      - --smp 1
      - --overprovisioned
      - --reserve-memory 0M
    ports:
      - "9092:9092"
      - "19092:19092"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # OBJECT STORAGE - MINIO (S3 Compatible for Delta Lake)
  # ===========================================================================
  
  minio:
    image: minio/minio:latest
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    mem_limit: 256m
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/bronze --ignore-existing;
      mc mb local/silver --ignore-existing;
      mc mb local/gold --ignore-existing;
      mc mb local/raw-streaming --ignore-existing;
      mc mb local/checkpoints --ignore-existing;
      echo '✅ MinIO buckets created';
      exit 0;
      "
    restart: "no"

  # ===========================================================================
  # SPARK 4.1.0 CLUSTER (with Real-Time Mode)
  # ===========================================================================
  
  spark-master:
    image: apache/spark:4.1.0
    mem_limit: 2g
    user: root
    command: /bin/bash -c "
      mkdir -p /opt/spark/logs &&
      mkdir -p /opt/spark/work/logs &&
      chown -R 185:185 /opt/spark &&
      gosu 185 /opt/spark/sbin/start-master.sh &&
      tail -f /dev/null"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_DAEMON_MEMORY=1g
      - SPARK_SQL_STREAMING_RTM_ENABLED=true
      # Disable master timeout to prevent premature shutdown during long-running jobs
      - SPARK_MASTER_OPTS=-Dspark.master.idle.timeout=0
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - spark_data:/opt/spark
    restart: unless-stopped

  spark-worker:
    image: apache/spark:4.1.0
    mem_limit: 6g
    user: root
    command: /bin/bash -c "
      mkdir -p /opt/spark/logs &&
      mkdir -p /opt/spark/work/logs &&
      chown -R 185:185 /opt/spark &&
      gosu 185 /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null"
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
      - SPARK_DAEMON_MEMORY=512m
      # Disable worker timeout to prevent premature shutdown during long-running jobs
      # TODO: Replace with basic heartbeat job to keep worker alive without risking resource leaks
      - SPARK_WORKER_OPTS=-Dspark.worker.timeout=0
      - SPARK_WORKER_CLEANUP_ENABLED=false
      - SPARK_WORKER_CLEANUP_INTERVAL=0
    ports:
      - "8081:8081"
    volumes:
      - spark_data:/opt/spark
    depends_on:
      - spark-master
    restart: unless-stopped
    deploy:
      replicas: 2

  spark-history-server:
    image: apache/spark:4.1.0
    mem_limit: 1g
    user: root
    command: /bin/bash -c "
      mkdir -p /opt/spark/logs &&
      mkdir -p /opt/spark/work/logs &&
      chown -R 185:185 /opt/spark &&
      gosu 185 /opt/spark/sbin/start-history-server.sh"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/work/logs
      - SPARK_DAEMON_MEMORY=512m
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "18080:18080"
    volumes:
      - spark_data:/opt/spark
    depends_on:
      - spark-master
    restart: unless-stopped

  # ===========================================================================
  # ORCHESTRATION - AIRFLOW 3.2.1
  # ===========================================================================
  
  airflow-webserver:
    <<: *airflow-common
    mem_limit: 1g
    command: api-server
    ports:
      - "8083:8793"
    environment:
      - AIRFLOW__API__PORT=8793
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:8083
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8793/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    mem_limit: 1g
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    mem_limit: 1g
    command: celery worker
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    mem_limit: 512m
    command: triggerer
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    mem_limit: 512m
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for postgres..."
        until pg_isready -h postgres -U airflow; do
          sleep 2
        done
        echo "Postgres is ready. Running migrations..."
        
        # Database migration (still works in Airflow 3.x)
        airflow db migrate
        
        # Set the auth manager (required for Airflow 3.x to use FAB auth)[citation:10]
        airflow config set --section core --value "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager" auth_manager
        
        # Create admin user (same as before)
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        
        # Add Spark connection (still works)
        airflow connections add 'spark_default' \
          --conn-type 'spark' \
          --conn-host 'spark://spark-master:7077' || true
        
        airflow variables set DATA_LAKE_BUCKET 'bronze'
        airflow variables set DELTA_LAKE_PATH 's3a://bronze/'
        
        echo "✅ Airflow 3.x initialized successfully"
        exit 0
    restart: "no"

  # ===========================================================================
  # BI DASHBOARD - METABASE
  # ===========================================================================
  
  metabase:
    image: metabase/metabase:latest
    mem_limit: 1g
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: airflow
      MB_DB_PASS: airflow
      MB_DB_AUTO_CREATE: "true"
    volumes:
      - metabase_data:/metabase.db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # MONITORING - PROMETHEUS & GRAFANA
  # ===========================================================================
  
  prometheus:
    image: prom/prometheus:latest
    mem_limit: 512m
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    mem_limit: 512m
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

# ==============================================================================
# VOLUMES (Persistent Data Storage)
# ==============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local
  minio_data:
    driver: local
  spark_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  metabase_data:
    driver: local